services:
  app:
    container_name: robot-dev-team
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8888}:8080"
    env_file:
      - .env
    environment:
      LOCAL_UID: ${LOCAL_UID:-1000}
      LOCAL_GID: ${LOCAL_GID:-1000}
    # Allows the container to reach the Docker host (and services mapped to
    # host ports, such as a locally deployed GitLab instance) using the stable
    # name 'host.docker.internal'. Required on Linux; Docker Desktop on
    # macOS/Windows provides this automatically.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prompts:/work/prompts:ro
      - ./config:/work/config:ro
      - ./run-logs:/work/run-logs
      - ./npm-cache:/work/.npm-cache
      - ${CLAUDE_CONFIG_PATH:-$HOME/.claude}:/home/appuser/.claude
      - ${GEMINI_CONFIG_PATH:-$HOME/.gemini}:/home/appuser/.gemini
      - ${CODEX_CONFIG_PATH:-$HOME/.codex}:/home/appuser/.codex
      # Parent mount for project repositories (auto-discovery + on-demand cloning)
      # Edit these paths to match your local projects directory structure
      # Read-write mount for work routes
      - ./projects:/work/projects
      # Read-only mount for analysis/review routes
      - ./projects:/work/projects-ro:ro
